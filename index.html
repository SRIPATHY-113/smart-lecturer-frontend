<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Lecturer Analysis System</title>
    <style>
        /* Your design and dashboard styling goes here */
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #fff; padding: 2rem; }
        input, button { padding: 0.5rem 1rem; border-radius: 4px; margin-right: 0.5rem; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🎓 Smart Lecturer Analysis Dashboard</h1>
    
    <div id="process-section">
        <input type="text" id="youtubeUrl" placeholder="Paste YouTube Lecture URL here..." style="width: 400px;">
        <button onclick="startPipeline()">Process Video</button>
    </div>

    <div id="status-display" style="margin-top: 2rem; color: #94a3b8;">
        Pipeline Status: <span id="current-status">Idle</span>
    </div>

    <script>
        const API_BASE_URL = "https://yhtapirs-smart-lecturer-backend.hf.space";

        async function startPipeline() {
            const urlInput = document.getElementById('youtubeUrl').value;
            if (!urlInput) return alert("Please enter a URL!");

            document.getElementById('current-status').innerText = "Sending request...";

            try {
                const response = await fetch(`${API_BASE_URL}/api/process`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });
                const data = await response.json();
                alert(data.message || data.error);
                checkStatus();
            } catch (err) {
                console.error(err);
                alert("Failed to reach cloud backend server.");
            }
        }

        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/status`);
                const data = await res.json();
                document.getElementById('current-status').innerText = `${data.status} (${data.progress}%) - ${data.message}`;
            } catch (err) {
                console.error(err);
            }
        }
        
        // Poll status every 5 seconds to keep dashboard up to date
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
